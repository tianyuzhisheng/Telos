<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命真道：查经资源共享站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 模拟温暖的米色/浅木质感背景 */
        body {
            background-color: #fdfaf5;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        .wood-border {
            border-top: 8px solid #5d4037;
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="wood-border bg-white shadow-sm py-8 px-4">
        <div class="container mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-[#5d4037] mb-2">生命真道</h1>
            <p class="text-lg text-[#8d6e63] tracking-widest">查经资源共享站</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-orange-100">
            
            <div class="aspect-video bg-black relative">
                <iframe class="absolute inset-0 w-full h-full" 
                        src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                        title="YouTube video player" frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen></iframe>
            </div>

            <div class="p-8 text-center">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">本周深度查经：在基督里的丰盛</h2>
                <p class="text-gray-600 mb-8 leading-relaxed">
                    欢迎来到本周的查经学习。通过这段视频，我们将一起探讨神话语中的奥秘。
                    点击下方按钮即可获取详细的查经指南和配套讲义。
                </p>

                <a href="#" class="inline-block bg-[#d4af37] hover:bg-[#b8962e] text-white text-xl font-bold py-4 px-10 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 mb-4">
                    📥 下载本周查经讲义
                </a>
                <p class="text-sm text-gray-400 italic">文件格式：PDF | 大小：2.4MB</p>
            </div>
        </div>
    </main>

    <section class="bg-[#5d4037] text-white py-12 px-4 mt-12">
        <div class="container mx-auto max-w-2xl text-center">
            <h3 class="text-2xl font-bold mb-6">联系我们 / 加入小组</h3>
            <div class="flex flex-col md:flex-row justify-center items-center gap-8">
                <div class="bg-white p-2 rounded-lg shadow-inner">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=WeChatID" alt="WeChat QR" class="w-32 h-32">
                </div>
                <div class="text-left">
                    <p class="text-lg mb-2 font-medium">微信扫码添加同工</p>
                    <p class="text-orange-200">微信号：YourWeChatID_Here</p>
                    <p class="text-sm text-orange-100/60 mt-4 italic">愿上帝的话语每日成为你的力量</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-6 text-center text-gray-400 text-sm">
        &copy; 2026 生命真道项目 · 纯手工打造的信仰基地
    </footer>

</body>
</html>
