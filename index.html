<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信徒成长资源站 - 演示版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">华人信仰资源项目</h1>
            <a href="#contact" class="bg-blue-600 text-white px-4 py-2 rounded">获取更新</a>
        </div>
    </nav>

    <header class="container mx-auto mt-10 p-6 text-center">
        <h2 class="text-3xl font-extrabold mb-4">通过深度查经，建立稳固信仰</h2>
        <p class="text-gray-600 max-w-2xl mx-auto">这是由牧师亲自带领的查经资源，旨在帮助华人小组长更轻松、更有力地牧养信徒。</p>
    </header>

    <main class="container mx-auto p-6">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden max-w-4xl mx-auto">
            <div class="aspect-video bg-black">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="p-6">
                <h3 class="text-2xl font-bold mb-2">本周主题：如何在动荡中寻找平安</h3>
                <p class="text-gray-600 mb-6">本段查经聚焦《腓立比书》第 4 章，探讨保罗在狱中如何保持喜乐。</p>
                
                <div class="flex flex-wrap gap-4">
                    <a href="#" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition">
                        📄 下载小组讨论指南 (PDF)
                    </a>
                    <a href="#" class="border-2 border-blue-600 text-blue-600 font-bold py-2 px-6 rounded-lg hover:bg-blue-50 transition">
                        📖 查看相关经文
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer id="contact" class="bg-gray-800 text-white mt-20 p-10 text-center">
        <p class="mb-2">© 2026 华人基督徒资源平台 (演示)</p>
        <p class="text-gray-400">目前处于测试阶段 | 愿神赐福</p>
    </footer>

</body>
</html>
